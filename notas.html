<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lançamento de Notas</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a href="index.html">
    <img src="./logo.png" alt="Logo do site" class="logo">
  </a>
</header>

<h1>Lançamento de notas</h1>

<!-- Seletor de turma (simula filtro que viria do banco) -->
<div style="text-align:center; margin-bottom:16px;">
  <select id="seletor-turma" onchange="carregarTurma(this.value)"
    style="padding:8px 16px; border-radius:8px; border:1px solid #ccc;">
    <option value="">Selecione a turma</option>
    <option value="3A">3º Ano A</option>
    <option value="3B">3º Ano B</option>
    <option value="2A">2º Ano A</option>
  </select>
</div>

<table id="tabela-notas" style="margin:auto;" border="4" cellpadding="10" bordercolor="#121212">
  <tr>
    <th>Alunos</th>
    <th>Matemática</th>
    <th>Geografia</th>
    <th>Ciências</th>
    <th>Português</th>
    <th>Física</th>
    <th>Química</th>
  </tr>
  <!-- Linhas geradas pelo JavaScript -->
</table>

<footer>
  <p>&copy; 2026 Sistema de Matrícula Escolar. Todos os direitos reservados.</p>
</footer>

<script src="js/notas.js"></script>
</body>
</html>
