<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Aluno</title>
    <link rel="stylesheet" href="./coordenador.css">
</head>

<body>

    <header>
        <a href="index.html">
            <img src="./logo.png.png" alt="Logo do site" class="logo">
        </a>
    </header>
    
    <div class="container_aluno">

        <div class="caixa_aluno">
            <h2>Cadastrar Aluno</h2>

            <input class="inputt" type="text" placeholder="Digite o nome do aluno 👤">
            <input class="inputt" type="date">
            <input class="inputt" type="number" placeholder="CPF 🧾">
            <input class="inputt" type="text" placeholder="Cep 00000-000 📮">
            <input class="inputt" type="text" placeholder="Bairro 🏘️">
            <input class="inputt" type="number" placeholder="Número 🏠">
            <input class="inputt" type="number" placeholder="Gerar matrícula 📄">

            <a href="./tela_professor.html">
                <button class="botao">Criar Matrícula</button>
            </a>

        </div>

    </div>

    <footer>
