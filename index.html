<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Matrícula Escolar</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topo">
    <img src="./logo.png.png" alt="logo" class="logo">
    <h1>Sistema de Matrícula Escolar</h1>
</header>

<main class="area_login">

    <div class="card_login">

        <h2>Acesso ao sistema</h2>

        <!-- CONTROLES (abas) -->
        <input type="radio" name="perfil" id="coord" checked>
        <input type="radio" name="perfil" id="prof">
        <input type="radio" name="perfil" id="aluno">

        <div class="tabs">
            <label for="coord">Coordenador</label>
            <label for="prof">Professor</label>
            <label for="aluno">Aluno</label>
        </div>

        <!-- FORMULÁRIOS -->

        <div class="formularios">

            <!-- Coordenador -->
            <form class="form coord">
                <input class="inputt" type="email" placeholder="Email institucional 📩" required>
                <input class="inputt" type="password" placeholder="Senha 🔐" required>
                <a href="tela_coordenador.html" class="botao">Entrar</a>
            </form>

            <!-- Professor -->
            <form class="form prof">
                <input class="inputt" type="email" placeholder="Email 📩" required>
                <input class="inputt" type="password" placeholder="Senha 🔐" required>
                <a href="tela_professor.html" class="botao">Entrar</a>
            </form>

            <!-- Aluno -->
            <form class="form aluno">
                <input class="inputt" type="number" placeholder="Matrícula 📄" required>
                <input class="inputt" type="password" placeholder="Senha 🔐" required>
                <a href="tela_aluno.html" class="botao">Entrar</a>
            </form>

        </div>

    </div>

</main>

<footer>
<p>&copy; 2026 Sistema de Matrícula Escolar</p>
</footer>

</body>
</html>
