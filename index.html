<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de alunos</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header>
        <img src="./logo.png.png" alt="logo so site" class="logo">
        <h1 class="titulo">Sistema de Matrícula Escolar</h1>
    </header>
    <!-- Login do professor -->
        <div class="container_login">

            <div class="login_p">
                <h2 class="prof"><span>Professor</span></h2>
                <input class="inputt" type="email" placeholder="Insira seu email 📩">
                <br>
                <input class="inputt" type="password" placeholder="Digite sua senha🔐">
                <br>
                <a href="./tela_professor.html"><button class="botao">Login</button></a>
                <a href="./criar_conta.html"><button class="botao">Criar conta</button></a>
            </div>

            <div class="login_a">
                <h2>Aluno</h2>
                <input class="inputt" type="number" placeholder="Insira sua matrícula 📩">
                <br>
                <input class="inputt" type="password" placeholder="Digite sua senha🔐">
                <br>
                <a href="./tela_aluno.html"><button class="botao">Login</button></a>
            </div>

        </div>
    
    <footer>
        <p>&copy; 2026 Sistema de Matrícula Escolar. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
